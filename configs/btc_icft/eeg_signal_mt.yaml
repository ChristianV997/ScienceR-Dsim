dataset_scope: local_eeg_signal_mt
pipeline_id: eeg_signal_mt_residual_v0
default_dataset_id: DS005620
default_m_features: outputs/btc_icft/eeg_level_m/DS005620/features_m_signal.csv
default_t_features: outputs/btc_icft/eeg_level_t/DS005620/features_t_signal.csv
default_out: outputs/btc_icft/eeg_signal_mt/DS005620

required_inputs:
  - features_m_signal.csv
  - features_t_signal.csv

required_outputs:
  - features_joined_signal.csv
  - metrics_signal_mt.json
  - nulls_signal.json
  - ablations_signal.json
  - alignment_report.json
  - artifact_report.json
  - omega_event.json
  - report.md

join_keys:
  - dataset_id
  - row_id
  - source_file
  - window_id
  - window_start_s
  - window_end_s
  - sample_start
  - sample_end

promotion_gate:
  require_explicit_targets: true
  min_delta_auc: 0.03
  max_delta_ece: 0.0
  require_nulls_passed: true
  require_ablations_passed: true
  require_alignment_passed: true
  require_no_artifact_dominance: true

guardrails:
  - no_data_download
  - no_model_training
  - no_label_inference
  - no_target_fabrication
  - no_legacy_mt_real_change
  - no_level_o
  - no_ontology_claims
  - no_soul_afterlife_claims
  - no_liberation_claims
  - q_not_self
  - q_not_soul
  - q_abs_not_suffering
  - f_dress_not_karma

notes:
  - Join is strict by composite key; any M row without matching T row raises ValueError.
  - Duplicate M or T keys raise ValueError.
  - Extra T rows are ignored with warnings.
  - promoted=false by default when no explicit validated y targets are present.
  - y must be explicit in M input; label text alone does not create y.
  - PyYAML is NOT required; tests may inspect this file as plain text.
  - Legacy DS005620 mt_real benchmark semantics are NOT modified by this pipeline.
