dataset_scope: local_eeg_level_t_signal
pipeline_id: eeg_level_t_signal_topology_v0
default_dataset_id: DS005620
default_signal_blocks: outputs/btc_icft/ds005620/signal_blocks
default_out: outputs/btc_icft/eeg_level_t/DS005620

required_inputs:
  - window_inventory.csv

required_outputs:
  - features_t_signal.csv
  - topology_quality_report.json
  - artifact_report.json
  - skipped_windows.json
  - omega_event.json
  - report.md

topology_columns:
  - dataset_id
  - row_id
  - source_file
  - window_id
  - window_start_s
  - window_end_s
  - sample_start
  - sample_end
  - n_channels
  - n_samples
  - sample_rate_hz
  - q_net
  - q_abs
  - f_dress
  - defect_density
  - n_triangles
  - n_valid_triangles
  - topology_quality
  - topology_status
  - warnings

guardrails:
  - no_data_download
  - no_model_training
  - no_label_inference
  - no_level_m_feature_extraction
  - no_residual_promotion
  - no_level_o
  - no_ontology_claims
  - no_soul_afterlife_claims
  - no_liberation_claims
  - q_not_self
  - q_not_soul
  - q_abs_not_suffering
  - f_dress_not_karma

notes:
  - Consumes window_inventory.csv from P8.2 signal-block probe output.
  - Topology metrics are operational proxies; not validated biomarkers.
  - PyYAML is NOT required; tests may inspect this file as plain text.
  - quality_passed is true only when all rows are finite and not artifact-dominated.
  - topology_artifact_dominance is true when mean_topology_quality < 0.25 OR
    more than half of rows have topology_quality < 0.25.
