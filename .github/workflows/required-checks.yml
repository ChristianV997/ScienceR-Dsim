name: Required Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  core-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install root dependencies
        run: pip install -r requirements.txt

      - name: Run core tests
        run: pytest -q tests

  awareness-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/awareness_studio

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Awareness package and dev extras
        run: pip install -e '.[dev]'

      - name: Run Awareness tests
        run: pytest -q tests
