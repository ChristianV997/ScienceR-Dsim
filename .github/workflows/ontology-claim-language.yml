name: Ontology Claim Language

on:
  pull_request:
  workflow_dispatch:

jobs:
  ontology-claim-language:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run claim-language validator
        run: |
          python tools/validate_ontology_claim_language.py --root . --scan-mode repo --baseline contracts/btc_icft/ontology_claims/claim_language_baseline.json --json-out outputs/btc_icft/ontology_claim_language_validation.json --markdown-out outputs/btc_icft/ontology_claim_language_validation.md
      - name: Upload validator report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ontology-claim-language-report
          path: |
            outputs/btc_icft/ontology_claim_language_validation.json
            outputs/btc_icft/ontology_claim_language_validation.md
          if-no-files-found: warn
