[pytest]
addopts = --import-mode=importlib --ignore=apps/awareness_studio
# apps/awareness_studio is an independently installable sub-project with its own
# pyproject.toml and its own tools/ package. Collecting it from the root suite binds
# the top-level `tools` module identity to apps/awareness_studio/tools (whichever
# collects first alphabetically), breaking every `from tools.<root_submodule> import`
# in the rest of the suite. Run its tests separately: cd apps/awareness_studio && pytest
